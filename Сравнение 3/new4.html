<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Dual Axis Slider</title>
    <style>
        .comparison-container {
            position: relative;
            max-width: 800px;
            margin: 2rem auto;
            overflow: hidden;
            border-radius: 8px;
        }

        .image-container {
            position: relative;
            height: 500px;
        }

        .image-after,
        .image-before img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Horizontal */
        .horizontal .image-before {
            position: absolute;
            width: 50%;
            height: 100%;
            overflow: hidden;
            z-index: 2;
        }

        /* Vertical */
        .vertical .image-before {
            position: absolute;
            width: 100%;
            height: 50%;
            overflow: hidden;
            z-index: 2;
        }

        .slider-handle {
            position: absolute;
            background: #fff;
            z-index: 3;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .horizontal .slider-handle {
            width: 4px;
            height: 100%;
            left: 50%;
            top: 0;
            cursor: col-resize;
        }

        .vertical .slider-handle {
            width: 100%;
            height: 4px;
            top: 50%;
            left: 0;
            cursor: row-resize;
        }

        .handle-circle {
            position: absolute;
            background: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .horizontal .handle-circle { left: 50%; top: 50%; }
        .vertical .handle-circle { left: 50%; top: 50%; }
    </style>
</head>
<body>
    <!-- Horizontal Slider -->
    <div class="comparison-container horizontal">
        <div class="image-container">
            <img src="https://picsum.photos/800/500?random=4" 
                 class="image-after" 
                 alt="After">
            <div class="image-before">
                <img src="https://picsum.photos/800/500?random=5" 
                     alt="Before">
            </div>
            <div class="slider-handle">
                <div class="handle-circle"></div>
            </div>
        </div>
    </div>

    <!-- Vertical Slider -->
    <div class="comparison-container vertical">
        <div class="image-container">
            <img src="https://picsum.photos/800/500?random=7" 
                 class="image-after" 
                 alt="After">
            <div class="image-before">
                <img src="https://picsum.photos/800/500?random=1" 
                     alt="Before">
            </div>
            <div class="slider-handle">
                <div class="handle-circle"></div>
            </div>
        </div>
    </div>

    <script>
        class ImageSlider {
            constructor(container) {
                this.container = container;
                this.direction = container.classList.contains('vertical') ? 'vertical' : 'horizontal';
                this.before = container.querySelector('.image-before');
                this.handle = container.querySelector('.slider-handle');
                this.isDragging = false;
                
                this.init();
            }

            init() {
                this.setPosition(50);
                this.addEventListeners();
            }

            addEventListeners() {
                const start = (e) => {
                    e.preventDefault();
                    this.isDragging = true;
                    document.body.style.cursor = this.direction === 'horizontal' 
                        ? 'col-resize' 
                        : 'row-resize';
                };

                const move = (e) => {
                    if (!this.isDragging) return;
                    
                    const rect = this.container.getBoundingClientRect();
                    const pos = this.direction === 'horizontal'
                        ? (e.clientX - rect.left) / rect.width * 100
                        : (e.clientY - rect.top) / rect.height * 100;

                    this.setPosition(Math.min(100, Math.max(0, pos)));
                };

                const end = () => {
                    this.isDragging = false;
                    document.body.style.cursor = 'default';
                };

                // Mouse events
                this.handle.addEventListener('mousedown', start);
                document.addEventListener('mousemove', move);
                document.addEventListener('mouseup', end);

                // Touch events
                this.handle.addEventListener('touchstart', (e) => start(e.touches[0]));
                document.addEventListener('touchmove', (e) => move(e.touches[0]));
                document.addEventListener('touchend', end);
            }

            setPosition(percentage) {
                if (this.direction === 'horizontal') {
                    this.before.style.width = `${percentage}%`;
                    this.handle.style.left = `${percentage}%`;
                } else {
                    this.before.style.height = `${percentage}%`;
                    this.handle.style.top = `${percentage}%`;
                }
            }
        }

        // Initialize all sliders
        window.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.comparison-container').forEach(container => {
                new ImageSlider(container);
            });
        });
    </script>
</body>
</html>
